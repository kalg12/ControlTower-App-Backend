# ── Production profile ────────────────────────────────────────────────
# All values MUST be provided via environment variables. No defaults here.

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.controltower: INFO
    org.springframework.security: WARN
    org.flywaydb: WARN
    org.hibernate.SQL: ERROR
