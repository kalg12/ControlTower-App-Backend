spring:
  application:
    name: controltower-app
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── DataSource ──────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:controltower}
    username: ${DB_USERNAME:controltower}
    password: ${DB_PASSWORD:controltower123}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ControlTowerHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / Hibernate ─────────────────────────────────────────────────
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        # dialect is auto-detected by Hibernate 6+ — no explicit value needed
        format_sql: true
        default_batch_fetch_size: 50

  # ── Flyway ──────────────────────────────────────────────────────────
  # Migrations are the SQL files under src/main/resources/db/migration (V1__, V2__, …).
  # They run automatically once when you start this Spring Boot app, if the DB is reachable.
  # You do not run V23/V24 manually — restart the backend after pulling new migration files.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # ── Redis ────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
      repositories:
        # Disable Redis repository scanning — app uses StringRedisTemplate directly.
        # Prevents "Could not safely identify store assignment" INFO noise at startup.
        enabled: false

  # ── Mail ─────────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.mailtrap.io}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:noreply@controltower.io}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  # ── Graceful shutdown ─────────────────────────────────────────────────
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # ── Jackson ──────────────────────────────────────────────────────────
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

# ── POS Webhook ───────────────────────────────────────────────────────
# Set POS_WEBHOOK_URL to the POS Backend base URL (e.g. http://pos-backend:3000)
# Set POS_WEBHOOK_SECRET to a shared secret (also set in POS Backend .env)
pos:
  webhook:
    url: ${POS_WEBHOOK_URL:}
    secret: ${POS_WEBHOOK_SECRET:}

# ── Server ────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: never
    include-stacktrace: never
  shutdown: graceful

# ── Management / Actuator ─────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}

# ── Custom App Properties ─────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:controltower-dev-secret-key-32-chars-minimum-length-ok}
    access-token-expiration-seconds: ${JWT_ACCESS_EXPIRATION:900}
    refresh-token-expiration-seconds: ${JWT_REFRESH_EXPIRATION:604800}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

  base-url: ${APP_BASE_URL:http://localhost:8080}

  encryption:
    key: ${ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}

  storage:
    path: ${STORAGE_PATH:./uploads}

  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

# ── Logging ───────────────────────────────────────────────────────────
logging:
  level:
    com.controltower: ${LOG_LEVEL:DEBUG}
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}
    # The AuthenticationProvider @Bean is intentional — suppress the expected WARN
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
    org.flywaydb: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"

# ── SpringDoc / Swagger ───────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false
