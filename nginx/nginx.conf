# ── Nginx reverse proxy for Control Tower (production) ────────────────────────
#
# Assumes SSL certificates are mounted at:
#   /etc/nginx/ssl/cert.pem
#   /etc/nginx/ssl/key.pem
#
# To use Let's Encrypt (Certbot) instead, replace the ssl_certificate directives
# with the paths Certbot writes to (/etc/letsencrypt/live/<domain>/...) and mount
# the letsencrypt directory into the container.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'req_id=$http_x_correlation_id';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;      # hide nginx version
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Additional layer on top of application-level Bucket4j rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge (for cert renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS proxy ────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        # ── SSL ────────────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Security headers ───────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Upload size (for ticket attachments) ───────────────────────────────
        client_max_body_size 20m;

        # ── API proxy ──────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass         http://app:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Forward or inject correlation ID
            proxy_set_header   X-Correlation-ID  $http_x_correlation_id;

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 10s;
        }

        # ── WebSocket (STOMP/SockJS) ───────────────────────────────────────────
        location /ws {
            proxy_pass          http://app:8080;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "Upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;
        }

        # ── Actuator (internal only — block from public internet) ─────────────
        location /actuator {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny  all;

            proxy_pass http://app:8080;
            proxy_set_header Host $host;
        }

        # ── Swagger UI ─────────────────────────────────────────────────────────
        location /swagger-ui/ {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
        }

        location /v3/api-docs {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
        }
    }
}
