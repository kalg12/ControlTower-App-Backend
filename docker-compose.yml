services:

  # ── PostgreSQL 17 ────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: controltower-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-controltower}
      POSTGRES_USER:     ${DB_USERNAME:-controltower}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-controltower123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-controltower} -d ${DB_NAME:-controltower}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - controltower-net

  # ── Redis 7 ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: controltower-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-}"
      --save 60 1
      --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG; else redis-cli ping | grep -q PONG; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - controltower-net

  # ── Control Tower App ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: controltower-app
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE:       ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST:                      postgres
      DB_PORT:                       5432
      DB_NAME:                      ${DB_NAME:-controltower}
      DB_USERNAME:                  ${DB_USERNAME:-controltower}
      DB_PASSWORD:                  ${DB_PASSWORD:-controltower123}
      REDIS_HOST:                   redis
      REDIS_PORT:                   6379
      REDIS_PASSWORD:               ${REDIS_PASSWORD:-}
      JWT_SECRET:                   ${JWT_SECRET:-controltower-dev-secret-key-32-chars-minimum-length-ok}
      JWT_ACCESS_EXPIRATION:        ${JWT_ACCESS_EXPIRATION:-900}
      JWT_REFRESH_EXPIRATION:       ${JWT_REFRESH_EXPIRATION:-604800}
      STRIPE_SECRET_KEY:            ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:        ${STRIPE_WEBHOOK_SECRET:-}
      CORS_ALLOWED_ORIGINS:         ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      LOG_LEVEL:                    ${LOG_LEVEL:-INFO}
      SECURITY_LOG_LEVEL:           ${SECURITY_LOG_LEVEL:-WARN}
      ENCRYPTION_KEY:               ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      STORAGE_PATH:                 /app/uploads
      MAIL_HOST:                    ${MAIL_HOST:-}
      MAIL_PORT:                    ${MAIL_PORT:-587}
      MAIL_USERNAME:                ${MAIL_USERNAME:-}
      MAIL_PASSWORD:                ${MAIL_PASSWORD:-}
      MAIL_FROM:                    ${MAIL_FROM:-noreply@controltower.io}
      APP_BASE_URL:                 ${APP_BASE_URL:-http://localhost:8080}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - controltower-net

networks:
  controltower-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
