name: CI/CD

# ── Branch strategy ──────────────────────────────────────────────────────────
#
#  feature/* ──PR──► develop ──PR──► master ──► (image pushed) ──► VPS auto-updates
#
#  • Tests run on every push to develop/master and on every PR.
#  • Docker image is only pushed to GHCR on a direct push to master.
#  • The VPS is never contacted by CI — Watchtower polls GHCR and deploys
#    automatically, so NO SSH secrets are needed in this repository.
#
# ── What you need to configure once ─────────────────────────────────────────
#
#  1. Make the GHCR package public (free, no auth needed anywhere):
#       GitHub → Packages → controltower-app → Package settings → Make Public
#
#  2. Set branch-protection rules on master (GitHub → repo → Settings → Branches):
#       • Require status check "Build & Test" to pass before merging
#       • Require pull request reviews
#
#  3. On the VPS: add Watchtower to docker-compose.prod.yml and restart.
#     Watchtower will pull the new :latest image automatically within 5 min
#     of every successful master push.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:

  # ── Job 1: Build & Test ───────────────────────────────────────────────────
  # Runs on every push and every PR — this is the quality gate.
  # Pull requests to master CANNOT be merged if this job is red (branch protection).
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

      - name: Run integration tests
        run: ./gradlew test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        continue-on-error: true
        with:
          name: JUnit Test Results
          path: build/test-results/test/*.xml
          reporter: java-junit

  # ── Job 2: Push Docker image to GHCR ─────────────────────────────────────
  # Runs only on master/main push AND only after Job 1 passes.
  # Uses the auto-provided GITHUB_TOKEN — no extra secrets needed.
  # After this job completes, Watchtower on the VPS detects the new :latest
  # tag and redeploys automatically (within the configured poll interval).
  push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/controltower-app:latest
            ghcr.io/${{ github.repository_owner }}/controltower-app:sha-${{ github.sha }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/controltower-app:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
        continue-on-error: true
